<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="monospace">
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8FD8FF"/>
    </marker>
    <marker id="arwG" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F2DC8E"/>
    </marker>
  </defs>

  <rect width="900" height="540" fill="#0E2A4A"/>
  <rect x="14" y="14" width="872" height="512" fill="none"
        stroke="#8FD8FF" stroke-width="2"/>

  <text x="450" y="52" text-anchor="middle" fill="#EAF4FF"
        font-size="24" font-weight="bold">THE PHOTON ROOM</text>
  <text x="450" y="76" text-anchor="middle" fill="#9FBEDA"
        font-size="13">sun to panel to banks — copper for the hungry, light for the small</text>

  <!-- SUN -->
  <circle cx="110" cy="170" r="34" fill="none" stroke="#F2DC8E" stroke-width="3"/>
  <g stroke="#F2DC8E" stroke-width="3">
    <line x1="110" y1="118" x2="110" y2="102"/>
    <line x1="110" y1="222" x2="110" y2="238"/>
    <line x1="58"  y1="170" x2="42"  y2="170"/>
    <line x1="162" y1="170" x2="178" y2="170"/>
    <line x1="73"  y1="133" x2="62"  y2="122"/>
    <line x1="147" y1="133" x2="158" y2="122"/>
    <line x1="73"  y1="207" x2="62"  y2="218"/>
    <line x1="147" y1="207" x2="158" y2="218"/>
  </g>
  <text x="110" y="266" text-anchor="middle" fill="#F2DC8E" font-size="14">SUN</text>

  <!-- PANEL -->
  <rect x="225" y="140" width="130" height="60" fill="none"
        stroke="#8FD8FF" stroke-width="2.5"/>
  <line x1="258" y1="140" x2="258" y2="200" stroke="#8FD8FF" stroke-width="1"/>
  <line x1="291" y1="140" x2="291" y2="200" stroke="#8FD8FF" stroke-width="1"/>
  <line x1="324" y1="140" x2="324" y2="200" stroke="#8FD8FF" stroke-width="1"/>
  <text x="290" y="222" text-anchor="middle" fill="#EAF4FF" font-size="14">SOLAR PANEL</text>
  <text x="290" y="240" text-anchor="middle" fill="#9FBEDA" font-size="11">100 W · USB-C out</text>

  <!-- BANKS -->
  <rect x="420" y="128" width="120" height="24" fill="none" stroke="#8FD8FF" stroke-width="2"/>
  <rect x="420" y="158" width="120" height="24" fill="none" stroke="#8FD8FF" stroke-width="2"/>
  <rect x="420" y="188" width="120" height="24" fill="none" stroke="#8FD8FF" stroke-width="2"/>
  <text x="480" y="234" text-anchor="middle" fill="#EAF4FF" font-size="14">BANKS ×3</text>
  <text x="480" y="252" text-anchor="middle" fill="#9FBEDA" font-size="11">99.5 Wh each · the flywheel</text>

  <!-- flow arrows -->
  <line x1="180" y1="170" x2="218" y2="170" stroke="#F2DC8E"
        stroke-width="3" marker-end="url(#arwG)"/>
  <line x1="358" y1="170" x2="412" y2="170" stroke="#8FD8FF"
        stroke-width="3" marker-end="url(#arw)"/>

  <!-- COPPER TIER -->
  <line x1="543" y1="150" x2="640" y2="120" stroke="#8FD8FF"
        stroke-width="3" marker-end="url(#arw)"/>
  <text x="586" y="118" fill="#8FD8FF" font-size="12">USB-C PD · to 140 W</text>
  <g fill="none" stroke="#8FD8FF" stroke-width="2">
    <rect x="655" y="78"  width="180" height="34"/>
    <rect x="655" y="120" width="180" height="34"/>
    <rect x="655" y="162" width="180" height="34"/>
  </g>
  <text x="745" y="100" text-anchor="middle" fill="#EAF4FF" font-size="13">LAPTOP · 30–140 W</text>
  <text x="745" y="142" text-anchor="middle" fill="#EAF4FF" font-size="13">PHONE · 20 W</text>
  <text x="745" y="184" text-anchor="middle" fill="#EAF4FF" font-size="13">FAN / SPEAKER</text>
  <text x="745" y="220" text-anchor="middle" fill="#8FD8FF" font-size="13"
        font-weight="bold">COPPER TIER — the gulpers</text>

  <!-- EMITTER -->
  <line x1="480" y1="216" x2="480" y2="300" stroke="#8FD8FF"
        stroke-width="3" marker-end="url(#arw)"/>
  <rect x="410" y="308" width="140" height="52" fill="none"
        stroke="#F2DC8E" stroke-width="2.5"/>
  <text x="480" y="330" text-anchor="middle" fill="#F2DC8E" font-size="13">IR EMITTER</text>
  <text x="480" y="348" text-anchor="middle" fill="#9FBEDA" font-size="11">Class 1 · &lt;10ms interlock</text>

  <!-- BEAMS -->
  <g stroke="#F2DC8E" stroke-width="2.5" stroke-dasharray="7,6">
    <line x1="552" y1="322" x2="648" y2="292" marker-end="url(#arwG)"/>
    <line x1="552" y1="336" x2="648" y2="336" marker-end="url(#arwG)"/>
    <line x1="552" y1="350" x2="648" y2="382" marker-end="url(#arwG)"/>
  </g>
  <g fill="none" stroke="#F2DC8E"
